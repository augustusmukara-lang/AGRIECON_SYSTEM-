<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harvest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container" style="padding:2rem 0;">
        <div class="card">
            <h2>Add Harvest Record</h2>
            <form method="POST" class="profile-form">
                <div class="form-grid">
                    <div class="form-group"><label>Crop Name</label><input type="text" name="crop_name" required></div>
                    <div class="form-group"><label>Quantity</label><input type="number" step="0.01" name="quantity"
                            required></div>
                    <div class="form-group"><label>Unit</label><input type="text" name="unit" required></div>
                    <div class="form-group"><label>Harvest Date</label><input type="date" name="harvest_date" required>
                    </div>
                </div>
                <div class="form-group"><label>Notes</label><textarea name="notes"></textarea></div>
                <button type="submit" class="btn-primary">Save Harvest</button>
            </form>
        </div>

        <div class="card" style="margin-top:1.5rem;">
            <h2>Harvest Records</h2>
            <a href="{{ url_for('export_csv', table_name='harvests') }}" class="btn-small">Export Excel (CSV)</a>
            <div class="table-wrapper">
                <table class="styled-table">
                    <thead>
                        <tr>
                            <th>Crop</th>
                            <th>Quantity</th>
                            <th>Unit</th>
                            <th>Date</th>
                            <th>Notes</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in records %}
                        <tr>
                            <td>{{ row.crop_name }}</td>
                            <td>{{ row.quantity }}</td>
                            <td>{{ row.unit }}</td>
                            <td>{{ row.harvest_date }}</td>
                            <td>{{ row.notes }}</td>
                            <td><a href="{{ url_for('delete_record', table='harvests', item_id=row.id) }}"
                                    class="btn-small danger">Delete</a></td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="6">No harvest records yet.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
